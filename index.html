<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>Jam AOD</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 20px;
    }

    .time {
      font-size: clamp(4.5rem, 14vw, 7rem);
      font-weight: 300;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .seconds { 
      font-size: 0.42em; 
      opacity: 0.75; 
      margin-left: 0.1em; 
    }

    .date {
      font-size: clamp(1.3rem, 5vw, 2rem);
      opacity: 0.85;
      margin-top: 10px;
    }

    /* Floating Button */
    .fab {
      position: fixed;
      bottom: 30px;
      left: 30px;
      background: rgba(255,255,255,0.15);
      color: white;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    /* Menu */
    .menu {
      position: fixed;
      bottom: 110px;
      left: 30px;
      background: rgba(30,30,30,0.95);
      border-radius: 16px;
      padding: 8px 0;
      display: none;
      flex-direction: column;
      gap: 4px;
      z-index: 90;
      min-width: 200px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .menu button {
      padding: 14px 20px;
      background: transparent;
      border: none;
      color: white;
      text-align: left;
      font-size: 0.95rem;
      width: 100%;
    }

    .menu button:active {
      background: rgba(255,255,255,0.2);
    }

    .battery {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 0.9rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="time" id="time">
    00:00<span id="seconds" class="seconds">:00</span>
    <span id="ampm" class="ampm"></span>
  </div>
  <div id="date" class="date">Senin, 22 Juni 2026</div>

  <!-- Battery -->
  <div class="battery" id="battery">🔋 --%</div>

  <!-- Floating Button -->
  <div class="fab" id="fab">⚙️</div>

  <!-- Menu -->
  <div class="menu" id="menu">
    <button onclick="toggleFullscreen()">⛶ Layar Penuh</button>
    <button onclick="toggleWakeLock()">🔒 Jaga Layar Nyala</button>
    <button onclick="toggleFormat()">24 Jam / 12 Jam</button>
    <button onclick="toggleSeconds()">Sembunyikan Detik</button>
  </div>

  <script>
    let is24Hour = true;
    let showSeconds = true;
    let wakeLock = null;

    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      let ampmText = '';

      if (!is24Hour) {
        ampmText = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
      }

      const hStr = hours.toString().padStart(2, '0');
      const mStr = now.getMinutes().toString().padStart(2, '0');
      const sStr = now.getSeconds().toString().padStart(2, '0');

      document.getElementById('time').childNodes[0].nodeValue = hStr + ':' + mStr;
      
      const secEl = document.getElementById('seconds');
      secEl.textContent = ':' + sStr;
      secEl.style.display = showSeconds ? 'inline' : 'none';

      document.getElementById('ampm').textContent = !is24Hour ? ampmText : '';

      document.getElementById('date').textContent = now.toLocaleDateString('id-ID', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });
    }

    // Battery
    function initBattery() {
      if ('getBattery' in navigator) {
        navigator.getBattery().then(b => {
          const el = document.getElementById('battery');
          const update = () => el.textContent = `🔋 ${Math.round(b.level*100)}%`;
          update();
          b.addEventListener('levelchange', update);
        });
      }
    }

    // Fullscreen
    function toggleFullscreen() {
      const d = document.documentElement;
      if (!document.fullscreenElement) {
        d.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    }

    // Wake Lock
    async function toggleWakeLock() {
      if (!('wakeLock' in navigator)) return alert('Tidak didukung');
      try {
        if (wakeLock) {
          await wakeLock.release();
          wakeLock = null;
        } else {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch(e) {}
    }

    function toggleFormat() {
      is24Hour = !is24Hour;
      updateClock();
    }

    function toggleSeconds() {
      showSeconds = !showSeconds;
      updateClock();
      const btn = document.querySelector('button[onclick="toggleSeconds()"]');
      btn.textContent = showSeconds ? 'Sembunyikan Detik' : 'Tampilkan Detik';
    }

    // Menu toggle
    const fab = document.getElementById('fab');
    const menu = document.getElementById('menu');

    fab.addEventListener('click', () => {
      menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
    });

    document.addEventListener('click', (e) => {
      if (!fab.contains(e.target) && !menu.contains(e.target)) {
        menu.style.display = 'none';
      }
    });

    // Init
    function init() {
      updateClock();
      setInterval(updateClock, 1000);
      initBattery();
    }

    window.onload = init;
  </script>
</body>
</html>
