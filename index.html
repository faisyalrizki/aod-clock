<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>Jam AOD</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100dvh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 50px;
      overflow: hidden;
      padding: 20px;
    }

    .analog {
      position: relative;
      width: 270px;
      height: 270px;
      border: 16px solid #222;
      border-radius: 50%;
      background: #111;
      flex-shrink: 0;
    }

    .number {
      position: absolute;
      width: 100%;
      height: 100%;
      text-align: center;
      font-size: 1.35rem;
      font-weight: 400;
      color: #ccc;
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: bottom center;
      border-radius: 999px;
    }

    .hour-hand   { width: 8px; height: 78px; background: #eee; margin-left: -4px; }
    .minute-hand { width: 5px; height: 102px; background: #eee; margin-left: -2.5px; }
    .second-hand { width: 3px; height: 112px; background: #ff4757; margin-left: -1.5px; }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 18px;
      height: 18px;
      background: #fff;
      border: 3px solid #111;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }

    .calendar {
      background: #111;
      padding: 28px 32px;
      border-radius: 28px;
      text-align: center;
      min-width: 230px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    }

    .month {
      color: #ff4757;
      font-size: 1.15rem;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    .day {
      font-size: 6.8rem;
      font-weight: 200;
      line-height: 0.85;
    }

    .weekday {
      font-size: 1.75rem;
      margin-top: 8px;
    }

    .year {
      font-size: 1.15rem;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="analog" id="analog">
    <!-- Numbers 1-12 -->
    <div class="number" style="transform: rotate(30deg);"><div style="transform: rotate(-30deg);">1</div></div>
    <div class="number" style="transform: rotate(60deg);"><div style="transform: rotate(-60deg);">2</div></div>
    <div class="number" style="transform: rotate(90deg);"><div style="transform: rotate(-90deg);">3</div></div>
    <div class="number" style="transform: rotate(120deg);"><div style="transform: rotate(-120deg);">4</div></div>
    <div class="number" style="transform: rotate(150deg);"><div style="transform: rotate(-150deg);">5</div></div>
    <div class="number" style="transform: rotate(180deg);"><div style="transform: rotate(-180deg);">6</div></div>
    <div class="number" style="transform: rotate(210deg);"><div style="transform: rotate(-210deg);">7</div></div>
    <div class="number" style="transform: rotate(240deg);"><div style="transform: rotate(-240deg);">8</div></div>
    <div class="number" style="transform: rotate(270deg);"><div style="transform: rotate(-270deg);">9</div></div>
    <div class="number" style="transform: rotate(300deg);"><div style="transform: rotate(-300deg);">10</div></div>
    <div class="number" style="transform: rotate(330deg);"><div style="transform: rotate(-330deg);">11</div></div>
    <div class="number" style="transform: rotate(0deg);"><div style="transform: rotate(0deg);">12</div></div>

    <div class="hand hour-hand" id="hour"></div>
    <div class="hand minute-hand" id="minute"></div>
    <div class="hand second-hand" id="second"></div>
    <div class="center"></div>
  </div>

  <div class="calendar">
    <div class="month" id="month">JUNI</div>
    <div class="day" id="day">22</div>
    <div class="weekday" id="weekday">SENIN</div>
    <div class="year" id="year">2026</div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();

      const secDeg = now.getSeconds() * 6;
      const minDeg = now.getMinutes() * 6 + secDeg / 60;
      const hrDeg  = (now.getHours() % 12) * 30 + minDeg / 12;

      document.getElementById('second').style.transform = `rotate(${secDeg}deg)`;
      document.getElementById('minute').style.transform = `rotate(${minDeg}deg)`;
      document.getElementById('hour').style.transform = `rotate(${hrDeg}deg)`;

      document.getElementById('month').textContent = now.toLocaleString('id-ID', {month:'long'}).toUpperCase();
      document.getElementById('day').textContent = now.getDate();
      document.getElementById('weekday').textContent = now.toLocaleString('id-ID', {weekday:'long'}).toUpperCase();
      document.getElementById('year').textContent = now.getFullYear();
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
